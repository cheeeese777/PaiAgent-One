server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/paiagent?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

paiagent:
  jwt:
    secret: PaiAgentSecretKeyForJwtTokenGeneration2024MustBeLongEnough
    expiration-ms: 86400000
  llm:
    deepseek:
      api-key: sk-f9d1f82d00a345d58e5eca140ec843a5  # 从环境变量读取,或留空使用 Mock
      api-url: https://api.deepseek.com/v1/chat/completions
      default-model: deepseek-chat
